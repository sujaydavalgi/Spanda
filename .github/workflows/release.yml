name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - run: npm test
      - run: npm run build
      - run: npm run build --workspace=@spanda/lsp
      - run: npm install --prefix editor/vscode
      - run: npm run package:ci --prefix editor/vscode

  github-release:
    name: Publish GitHub release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@spanda/lsp
      - run: npm install --prefix editor/vscode
      - run: npm run package:ci --prefix editor/vscode
      - name: Create or update GitHub release from changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file CHANGELOG.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file CHANGELOG.md
          fi
      - name: Upload VS Code extension artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" editor/vscode/*.vsix --clobber
