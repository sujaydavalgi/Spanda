# Bump workspace semver and optionally push a release tag.
#
# Run manually from Actions → "Bump version". Choose patch, minor, or major.
# When "Push release tag" is enabled, pushes vX.Y.Z which triggers release.yml.
#
# For routine releases, prefer labeling the PR (release:major|minor|patch) so
# "Auto release" runs after CI on merge. Use this workflow for ad-hoc bumps.

name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver component to increment
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      push_tag:
        description: Push v* tag to trigger the release workflow
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  bump:
    uses: ./.github/workflows/release-bump.yml
    with:
      bump: ${{ inputs.bump }}
      push_tag: ${{ inputs.push_tag }}
