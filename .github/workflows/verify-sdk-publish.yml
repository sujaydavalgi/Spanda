name: Verify SDK publish readiness

on:
  pull_request:
    paths:
      - 'packages/sdk-python/**'
      - 'packages/web/**'
      - 'scripts/verify_sdk_publish_ready.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: ./scripts/verify_sdk_publish_ready.sh
