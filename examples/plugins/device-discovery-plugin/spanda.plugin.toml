[plugin]
name = "spanda-plugin-device-discovery-example"
version = "0.1.0"
publisher = "spanda"
description = "Example device discovery plugin"
license = "Apache-2.0"
type = "device-discovery"

[compatibility]
spanda_version = ">=0.4.0"
api_version = "v1"

[capabilities]
requires = [
  "device.read",
  "device.write",
  "network.outbound"
]

[security]
signed = false
sandbox = true
network = false
filesystem = "read-only"

[hooks]
enabled = ["on_entity_event"]
