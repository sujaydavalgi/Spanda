[plugin]
name = "spanda-plugin-readiness-example"
version = "0.1.0"
publisher = "spanda"
description = "Example readiness plugin with mission verification hooks"
license = "Apache-2.0"
type = "readiness"

[compatibility]
spanda_version = ">=0.4.0"
api_version = "v1"

[capabilities]
requires = [
  "entity.read",
  "readiness.read",
  "readiness.write",
  "device.read"
]

[security]
signed = false
sandbox = true
network = false
filesystem = "read-only"

[hooks]
enabled = [
  "on_install",
  "on_enable",
  "on_readiness_completed"
]

[cli]
commands = [
  { name = "check", namespace = "healthcare", description = "Run readiness check" }
]
