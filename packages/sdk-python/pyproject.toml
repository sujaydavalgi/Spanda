[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "spanda-sdk"
version = "0.4.0"
description = "Python client for Spanda Control Center REST API v1"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["urllib3>=2.0"]

[project.optional-dependencies]
stream = ["websockets>=12"]
dev = ["pytest>=7", "websockets>=12"]

[tool.setuptools.packages.find]
where = ["src"]
