description = "Production TLS certificate policy for Spanda discovery transports"
license = "Apache-2.0"

[safety]
level = "sensors"

[capabilities]
required = [
  "network.http",
]

[adapter]
provides = ["discovery.tls"]
requires = ["network.http"]
